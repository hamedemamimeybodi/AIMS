name: CI

on:
  push:
  pull_request:

jobs:
  docs-and-skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository skeleton
        run: |
          test -f README.md
          test -f ROADMAP.md
          test -f CONSTITUTION.md
          test -d docs
          test -d specs
          test -d rfcs
          test -d adr
