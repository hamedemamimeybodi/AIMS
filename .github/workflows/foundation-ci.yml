name: Foundation CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Test
        run: pytest
      - name: Smoke CLI
        run: python -m apps.cli.main validate examples/simple_site.dxf --db build/aims.sqlite --report build/report.md --json build/report.json || test $? -eq 2
