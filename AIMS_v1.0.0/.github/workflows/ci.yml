name: AIMS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Validate layout
        run: python -m aims.cli validate --version 1.0.0
      - name: Release gate
        run: python -m aims.cli release-check --version 1.0.0
      - name: Tests
        run: pytest
      - name: Smoke audit
        run: python -m aims.cli audit examples/simple_site.dxf
